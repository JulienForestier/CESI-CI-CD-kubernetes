apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiservice
  labels:
    app: apiservice
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: apiservice
  template:
    metadata:
      labels:
        app: apiservice
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        fsGroupChangePolicy: Always
      containers:
        - name: apiservice
          image: ghcr.io/OWNER/API:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: myapp-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seLinuxOptions: {}
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: collectorshop-db-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: collectorshop-db-app
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: collectorshop-db-app
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: collectorshop-db-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collectorshop-db-app
                  key: password
            - name: ConnectionStrings__collectorshop
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
            # Jwt__Key : conservé le temps que le nouveau build (OIDC/BFF) soit effectivement
            # déployé — l'ancienne image encore en place à l'écriture de ce commit en a toujours
            # besoin. À retirer, avec le SealedSecret collectorshop-jwt, une fois le rollout confirmé.
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: collectorshop-jwt
                  key: Jwt__Key
            # URL interne au cluster (même namespace) — atteinte directement, plus rapide et sans
            # saut par l'ingress public que pour les requêtes venant du navigateur.
            - name: IdentityService__Authority
              value: "http://identityservice"
            - name: Bff__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: collectorshop-bff
                  key: Bff__ClientSecret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
