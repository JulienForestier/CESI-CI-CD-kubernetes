apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cesi-ci-cd-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/JulienForestier/CESI-CI-CD-kubernetes.git'
    targetRevision: dev
    path: overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cesi-ci-cd-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true