resources:
- ../../base
- namespace.yaml
- ingress.yaml
- ghcr-sealed-secret.yaml
- configmap.yaml
- jwt-sealed-secret.yaml

namespace: cesi-ci-cd-rec

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: myapp
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: ghcr.io/OWNER/API
  newName: ghcr.io/julienforestier/collector-shop-api
  newTag: 1.0.0
- name: ghcr.io/OWNER/REPO
  newName: ghcr.io/julienforestier/collector-shop
  newTag: 1.0.0
