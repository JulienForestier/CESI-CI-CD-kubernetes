apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- namespace.yaml
- ingress.yaml
- ghcr-sealed-secret.yaml
- configmap.yaml
- jwt-sealed-secret.yaml

namespace: cesi-ci-cd-dev

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: myapp

images:
- name: ghcr.io/OWNER/API
  newName: ghcr.io/julienforestier/collector-shop-api
  newTag: 4befe4d
- name: ghcr.io/OWNER/REPO
  newName: ghcr.io/julienforestier/collector-shop
  newTag: 4befe4d
