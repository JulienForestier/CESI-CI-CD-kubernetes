resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml
  - ghcr-sealed-secret.yaml

namespace: cesi-ci-cd-dev

patches:
  - target:
      kind: Deployment
      name: myapp
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: ENV
            value: dev

images:
  - name: ghcr.io/OWNER/REPO
    newName: ghcr.io/julienforestier/collector-shop
    newTag: 8c18229
