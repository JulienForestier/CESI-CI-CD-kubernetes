apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: myapp
          image: ghcr.io/julienforestier/collector-shop:dfc6f0a09a50
          ports:
            - containerPort: 3000
          env:
            - name: ENV
              value: "dev"