resources:
- ../../base
- namespace.yaml
- ingress.yaml
- ghcr-sealed-secret.yaml
- configmap.yaml
- jwt-sealed-secret.yaml
- bff-sealed-secret.yaml
- identity-signing-sealed-secret.yaml

namespace: cesi-ci-cd-prod

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: myapp
- patch: |-
    - op: replace
      path: /spec/instances
      value: 2
  target:
    kind: Cluster
    name: collectorshop-db
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: ghcr.io/OWNER/API
  newName: ghcr.io/julienforestier/collector-shop-api
  newTag: 20c2df0
- name: ghcr.io/OWNER/IDENTITY
  newName: ghcr.io/julienforestier/collector-shop-identity
  newTag: 20c2df0
- name: ghcr.io/OWNER/REPO
  newName: ghcr.io/julienforestier/collector-shop
  newTag: 20c2df0
